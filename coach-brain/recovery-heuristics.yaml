---
# Recovery Heuristics
# Evidence-based guidelines for assessing and managing athlete recovery.

recovery_heuristics:
  tsb_interpretation:
    description: TSB (Training Stress Balance) = CTL - ATL. Also called "form".
    ranges:
      very_negative:
        value: "< -20"
        meaning: "Overreached or high fatigue. Reduce load immediately."
        action: "Prescribe 1–3 easy days. Monitor HRV and subjective feel."
      negative:
        value: "-10 to -20"
        meaning: "Accumulated fatigue from a training block. Normal in build phases."
        action: "Appropriate for mid-block. Ensure recovery week is planned."
      neutral:
        value: "-10 to +5"
        meaning: "Moderate freshness. Good for most training sessions."
        action: "Proceed with planned training."
      positive:
        value: "+5 to +25"
        meaning: "Fresh and rested. Good for quality sessions or racing."
        action: "Ideal for key workouts. Avoid too many consecutive days here (detraining)."
      very_positive:
        value: "> +25"
        meaning: "Very fresh, possibly detrained."
        action: "Likely over-tapered. Resume structured training."

  ramp_rate:
    description: Rate of CTL change per week. Target for sustainable progression.
    safe_range: "+3 to +8 CTL points per week"
    warning: "> +10 per week significantly increases injury and illness risk"
    conservative: "+3 to +5 for masters athletes (40+) or returning from injury"

  hrv_interpretation:
    description: >
      HRV (Heart Rate Variability) reflects autonomic nervous system recovery.
      Higher rMSSD generally indicates better recovery, but trend matters more
      than absolute value. Compare to the athlete's own 30-day baseline.
    guidance:
      well_recovered: "HRV at or above 7-day rolling average"
      mildly_fatigued: "HRV 5–10% below rolling average"
      fatigued: "HRV > 10% below rolling average — reduce intensity"
      very_fatigued: "HRV > 20% below average — easy day or rest only"
    caution: >
      HRV is one signal, not the whole picture. Integrate with sleep quality,
      subjective feel, and recent training load before deciding.

  sleep:
    minimum_for_adaptation: "7 hours for most athletes"
    optimal: "8–9 hours during heavy training blocks"
    impact_of_poor_sleep: >
      < 6 hours significantly impairs glycogen resynthesis, hormone production
      (growth hormone, testosterone), and reaction time.
      Do not schedule high-intensity sessions after consecutive nights of poor sleep.

  subjective_feel:
    scale: "1–10 (1 = exhausted, 10 = excellent)"
    guidance:
      1_to_4: "Rest or easy active recovery only"
      5_to_6: "Moderate training OK; skip intensity"
      7_to_8: "Normal training as planned"
      9_to_10: "Key session or race"

  consecutive_hard_days:
    max_before_recovery: 2
    note: >
      Stacking 3+ high-intensity days without an easy day significantly increases
      injury risk and reduces quality of subsequent sessions.
      The second hard day is almost always lower quality than the first.

  recovery_week_frequency:
    general: "Every 3rd or 4th week"
    masters_40_plus: "Every 2nd or 3rd week"
    volume_reduction: "30–40% reduction from peak week"
    intensity: "Reduce intensity AND volume during recovery weeks"

# Fatigue Management
fatigue_management:
  overtraining_syndrome_warning_signs:
    signs:
      - "Performance decline despite maintained or increased training"
      - "Persistent HRV suppression > 2 weeks"
      - "Elevated resting HR > 5 bpm above normal"
      - "Mood disturbances: irritability, depression, lack of motivation"
      - "Sleep disturbances despite fatigue"
      - "Increased illness frequency"
      - "Muscle soreness that does not resolve with rest"
    action: >
      If 3+ signs present: recommend 1–2 weeks complete rest, followed by
      gradual return. Consider referral to sports medicine physician if
      symptoms persist beyond 2 weeks of rest.

  non_functional_overreaching:
    description: >
      Performance decline that takes weeks to months to recover from.
      Distinct from functional overreaching (days to 1 week recovery).
    prevention:
      - "Never increase weekly load > 10% from previous week"
      - "Enforce recovery weeks every 3–4 weeks"
      - "Monitor TSB — do not sustain TSB < -20 for more than 2 weeks"
      - "Treat illness and injury as mandatory rest"
