---
# Altitude Acclimatization
# Evidence-based guidance for training at altitude and preparing for altitude events.
# Sources: Levine & Stray-Gundersen (1997), Millet et al. (2010), Wilber (2011),
#          Bärtsch & Saltin (2008), Stray-Gundersen & Levine (1997).

altitude_acclimatization:

  overview:
    description: >
      Altitude (> 1500 m) reduces partial pressure of oxygen, triggering a cascade
      of acute and chronic adaptations. Training quality drops immediately on arrival
      but improves over 2–3 weeks as the body acclimatises.
    key_adaptations:
      acute_days_1_3:
        - "Increased ventilation rate (hyperventilation)"
        - "Elevated heart rate for a given power/pace"
        - "Reduced plasma volume (haemoconcentration — CTL and ATL inflate)"
        - "Poor sleep quality common (Cheyne-Stokes breathing at altitude)"
      subacute_days_4_14:
        - "Rising erythropoietin (EPO) production drives red blood cell synthesis"
        - "Plasma volume partially restores"
        - "Aerobic capacity (VO2max) begins recovering toward sea-level values"
      chronic_day_15_plus:
        - "Increased haemoglobin mass (peak benefit ~21 days)"
        - "Improved lactate buffering capacity"
        - "Sea-level performance benefit lasts 2–4 weeks post-descent"

  elevation_zones:
    low: "1500–2000 m — mild hypoxic stimulus; useful for live-high train-low"
    moderate: "2000–3000 m — primary training altitude; best balance of stimulus and quality"
    high: "3000–4000 m — strong stimulus but training quality severely compromised"
    extreme: "> 4000 m — avoid sustained training; acute mountain sickness risk is high"

  training_adjustments:
    days_1_3:
      intensity: "Reduce all sessions by 20–30%. No threshold or VO2max work."
      volume: "Cut total volume 20% from sea-level plan."
      rationale: "Plasma volume contraction and ventilatory stress make quality work impossible and risky."
    days_4_14:
      intensity: "Gradual return. Threshold sessions allowed if HRV and subjective feel are good."
      volume: "Return to 80–90% of normal volume by day 10."
      tsb_warning: >
        ATL rises faster at altitude for the same perceived effort. Watch TSB closely —
        it will appear more negative than at sea level for equivalent training.
    day_15_plus:
      intensity: "Normal training resumes. Key sessions can target sea-level power targets."
      note: "Some athletes feel stronger than sea-level baseline by week 3."

  acute_mountain_sickness:
    threshold_elevation_m: 2500
    symptoms:
      - "Headache (primary symptom)"
      - "Nausea or vomiting"
      - "Fatigue disproportionate to effort"
      - "Dizziness or lightheadedness"
      - "Poor sleep despite tiredness"
    severity_score: "Lake Louise Score \u2265 3 with headache = AMS. \u2265 5 = severe."
    action: >
      Mild AMS: rest at current elevation, hydrate well, avoid further ascent.
      Moderate/severe AMS: descend immediately (minimum 300–500 m).
      Do NOT attempt training during AMS — it accelerates symptom progression.
    red_flags_descend_immediately:
      - "Confusion or disorientation (HACE — High Altitude Cerebral Edema)"
      - "Cough producing pink frothy sputum (HAPE — High Altitude Pulmonary Edema)"
      - "Inability to walk a straight line"
    coaching_note: >
      Refer to medical professional if red-flag symptoms appear.
      AMS risk is individual and not predicted by fitness level.

  live_high_train_low:
    description: >
      Sleep and rest at altitude (2200–2500 m), train at lower elevation (< 1200 m)
      to maintain training quality. Gold standard for altitude benefit without
      compromising session intensity.
    minimum_exposure: "12 hours/day at altitude for at least 21 days"
    practical_notes: "Requires altitude tent or access to high-altitude residence near low training venue."

  sea_level_performance_window:
    optimal_race_timing:
      within_48h: >
        Race within 24–48 hours of descent. Haemoglobin mass still elevated,
        plasma volume not yet diluted. Best for short efforts.
      days_14_to_21: >
        Second optimal window: haemoglobin mass still elevated, plasma volume
        fully restored, training quality recovered. Ideal timing for most athletes.
    avoid: "Days 3–12 post-descent: plasma dilution and residual fatigue reduce performance."

  practical_guidance:
    arrive_early: "Arrive at altitude destination \u2265 3 weeks before a key race, or arrive < 24h before."
    hydration: "Increase fluid intake by 500–750 ml/day. Altitude increases respiratory water loss."
    iron: "Check ferritin before altitude camp. Iron deficiency blunts EPO response. Target > 50 \u03bcg/L."
    sleep: "Expect disrupted sleep for the first 3–5 nights. Avoid sleep aids if possible."
    power_targets: >
      Power at threshold drops 1–3% per 1000 m above 1500 m. Adjust FTP targets accordingly.
      Do not chase sea-level power numbers — train by HR or RPE for the first week.
